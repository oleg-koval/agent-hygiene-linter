name: Update major tag

# Keep a moving major tag (e.g. v1) pointed at the latest release so Marketplace
# consumers and reusable workflows can pin `@v1` and never touch it again.
on:
  release:
    types: [published]

permissions: {}

jobs:
  move-major-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create/update the major tag ref via the API
    steps:
      - name: Point major tag at this release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          MAJOR="${REF_NAME%%.*}" # v1.2.3 -> v1
          # No checkout/git push needed: update the ref directly through the API.
          if gh api "repos/$REPO/git/refs/tags/$MAJOR" >/dev/null 2>&1; then
            gh api -X PATCH "repos/$REPO/git/refs/tags/$MAJOR" -f sha="$SHA" -F force=true
          else
            gh api -X POST "repos/$REPO/git/refs" -f ref="refs/tags/$MAJOR" -f sha="$SHA"
          fi
